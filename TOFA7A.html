<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TOFA7A AURA</title>
    <style>
        /* Reset */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 3rem;
            color: #1a73e8;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            user-select: none;
            text-align: center;
            text-shadow: 0 2px 6px rgba(26,115,232,0.3);
        }

        .converter-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 620px;
            padding: 30px 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-family: 'Source Code Pro', monospace;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s ease;
            color: #222;
            background: #fafafa;
        }

            textarea:focus {
                border-color: #1a73e8;
                outline: none;
                background: #fff;
                box-shadow: 0 0 8px rgba(26,115,232,0.3);
                color: #000;
            }

        button {
            background-color: #1a73e8;
            border: none;
            color: white;
            padding: 14px 0;
            font-size: 17px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            user-select: none;
        }

            button:hover {
                background-color: #155ab6;
                box-shadow: 0 0 12px rgba(21,90,182,0.8);
            }

            button:active {
                background-color: #0e3a7a;
                box-shadow: none;
            }

        .copy-small {
            align-self: flex-end;
            padding: 7px 18px;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 10px;
            background-color: #e8f0fe;
            color: #1a73e8;
            border-radius: 10px;
            border: 2px solid #1a73e8;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
            user-select: none;
        }

            .copy-small:hover {
                background-color: #1a73e8;
                color: white;
            }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            color: #666;
            font-weight: 600;
            user-select: none;
            text-align: center;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2.2rem;
            }

            .converter-box {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <h1>TOFA7A AURA</h1>

    <div class="converter-box">
        <textarea id="input" placeholder="Enter code here: e.g., 30 48 2D ?? ?? 08 ..."></textarea>
        <button onclick="convertToCpp()">Convert ➜ C++</button>
        <textarea id="cppOutput" placeholder="C++ output..." readonly></textarea>
        <button class="copy-small" onclick="copyText('cppOutput')">📋 Copy</button>

        <button onclick="convertToAob()">Convert ➜ C#</button>
        <textarea id="csharpOutput" placeholder="C# output..." readonly></textarea>
        <button class="copy-small" onclick="copyText('csharpOutput')">📋 Copy</button>
    </div>

    <div class="footer">by TOFA7A AURA &copy; 2025</div>

    <script>
        function convertToCpp() {
            const input = document.getElementById("input").value.trim();
            const bytes = input.match(/[\da-fA-F?]{2}/g) || [];
            const cpp = bytes.map((b) => {
                if (b === "??") return "'?'";
                return "0x" + b.toUpperCase();
            }).join(", ");
            document.getElementById("cppOutput").value = cpp;
        }

        function convertToAob() {
            const input = document.getElementById("input").value.trim();
            const matches = input.match(/0x[\da-fA-F]{2}|'[?]'/g);
            const aob = (matches || []).map((b) => {
                if (b === "'?'") return "??";
                return b.replace("0x", "");
            }).join(" ");
            document.getElementById("csharpOutput").value = aob;
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied to clipboard!");
            }).catch(err => {
                console.error("Copy failed", err);
            });
        }
    </script>

</body>
</html>
